version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aiclass_db
    environment:
      POSTGRES_DB: ai_classroom_db
      POSTGRES_USER: proxy_app_user
      POSTGRES_PASSWORD: your_secure_user_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
